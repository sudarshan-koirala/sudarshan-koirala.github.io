<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 660" width="1040" height="660" role="img" aria-label="Which Genie do I need: mapping each need to a Genie">
  <defs>
    <linearGradient id="cbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0f1a"/>
      <stop offset="1" stop-color="#111019"/>
    </linearGradient>
  </defs>

  <rect width="1040" height="660" fill="url(#cbg)"/>

  <g font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif">
    <text x="60" y="80" fill="#f4f2ea" font-size="36" font-weight="800">Which Genie do I need?</text>
    <text x="62" y="114" fill="#aaa7b6" font-size="19">Match what you want to do with the right member of the family.</text>

    <!-- Row template: need pill (left) -> arrow -> genie pill (right) -->
    <!-- Row 1: One -->
    <g>
      <rect x="60" y="160" width="470" height="64" rx="14" fill="#171922" stroke="#2b2d36"/>
      <text x="86" y="199" fill="#e7e4ef" font-size="20">I just want answers from my data</text>
      <path d="M548 192 h44 m-14 -9 l14 9 -14 9" fill="none" stroke="#5b6478" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="612" y="160" width="368" height="64" rx="14" fill="#f97316" fill-opacity="0.14" stroke="#f97316" stroke-opacity="0.55"/>
      <circle cx="646" cy="192" r="8" fill="#f97316"/>
      <text x="670" y="200" fill="#f4f2ea" font-size="21" font-weight="700">Genie One</text>
    </g>
    <!-- Row 2: Spaces -->
    <g>
      <rect x="60" y="242" width="470" height="64" rx="14" fill="#171922" stroke="#2b2d36"/>
      <text x="86" y="281" fill="#e7e4ef" font-size="20">A curated data chat for my team</text>
      <path d="M548 274 h44 m-14 -9 l14 9 -14 9" fill="none" stroke="#5b6478" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="612" y="242" width="368" height="64" rx="14" fill="#5eead4" fill-opacity="0.12" stroke="#5eead4" stroke-opacity="0.5"/>
      <circle cx="646" cy="274" r="8" fill="#5eead4"/>
      <text x="670" y="282" fill="#f4f2ea" font-size="21" font-weight="700">Genie Spaces</text>
    </g>
    <!-- Row 3: Code -->
    <g>
      <rect x="60" y="324" width="470" height="64" rx="14" fill="#171922" stroke="#2b2d36"/>
      <text x="86" y="363" fill="#e7e4ef" font-size="20">Help writing code and pipelines</text>
      <path d="M548 356 h44 m-14 -9 l14 9 -14 9" fill="none" stroke="#5b6478" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="612" y="324" width="368" height="64" rx="14" fill="#818cf8" fill-opacity="0.14" stroke="#818cf8" stroke-opacity="0.55"/>
      <circle cx="646" cy="356" r="8" fill="#818cf8"/>
      <text x="670" y="364" fill="#f4f2ea" font-size="21" font-weight="700">Genie Code</text>
    </g>
    <!-- Row 4: Agents -->
    <g>
      <rect x="60" y="406" width="470" height="64" rx="14" fill="#171922" stroke="#2b2d36"/>
      <text x="86" y="445" fill="#e7e4ef" font-size="20">Automate a recurring workflow</text>
      <path d="M548 438 h44 m-14 -9 l14 9 -14 9" fill="none" stroke="#5b6478" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="612" y="406" width="368" height="64" rx="14" fill="#c084fc" fill-opacity="0.14" stroke="#c084fc" stroke-opacity="0.55"/>
      <circle cx="646" cy="438" r="8" fill="#c084fc"/>
      <text x="670" y="446" fill="#f4f2ea" font-size="21" font-weight="700">Genie Agents</text>
    </g>
    <!-- Row 5: Ontology -->
    <g>
      <rect x="60" y="488" width="470" height="64" rx="14" fill="#171922" stroke="#2b2d36"/>
      <text x="86" y="527" fill="#e7e4ef" font-size="20">Business context for all of it</text>
      <path d="M548 520 h44 m-14 -9 l14 9 -14 9" fill="none" stroke="#5b6478" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="612" y="488" width="368" height="64" rx="14" fill="#34d399" fill-opacity="0.14" stroke="#34d399" stroke-opacity="0.55"/>
      <circle cx="646" cy="520" r="8" fill="#34d399"/>
      <text x="670" y="528" fill="#f4f2ea" font-size="21" font-weight="700">Genie Ontology</text>
    </g>

    <text x="60" y="608" fill="#7f8798" font-size="15" font-style="italic">Names and features change fast &#8212; always check the official Databricks docs.</text>
  </g>
</svg>
