<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="The Databricks Genies: one brand, five AI assistants">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0e1a"/>
      <stop offset="0.55" stop-color="#0e1220"/>
      <stop offset="1" stop-color="#151019"/>
    </linearGradient>
    <linearGradient id="lamp" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fb923c"/>
      <stop offset="1" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="swirl" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#f97316" stop-opacity="0.85"/>
      <stop offset="0.5" stop-color="#e879f9" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#5eead4" stop-opacity="0.45"/>
    </linearGradient>
    <radialGradient id="halo" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#f97316" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#f97316" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <ellipse cx="300" cy="470" rx="360" ry="240" fill="url(#halo)"/>

  <!-- sparkles -->
  <g fill="#f4f2ea" opacity="0.7">
    <path d="M150 120 l4 12 12 4 -12 4 -4 12 -4 -12 -12 -4 12 -4 z"/>
    <path d="M1120 380 l3 9 9 3 -9 3 -3 9 -3 -9 -9 -3 9 -3 z" opacity="0.6"/>
    <circle cx="90" cy="330" r="2.5" opacity="0.5"/>
    <circle cx="560" cy="60" r="2" opacity="0.5"/>
    <circle cx="1060" cy="120" r="2.5" opacity="0.5"/>
  </g>

  <!-- swirl ribbon from lamp to the constellation -->
  <path d="M392 452 C 500 430 520 300 610 240 C 690 186 780 182 862 198 C 944 214 1012 244 1082 222"
        fill="none" stroke="url(#swirl)" stroke-width="9" stroke-linecap="round" filter="url(#glow)" opacity="0.9"/>
  <path d="M392 452 C 500 430 520 300 610 240 C 690 186 780 182 862 198 C 944 214 1012 244 1082 222"
        fill="none" stroke="url(#swirl)" stroke-width="3.5" stroke-linecap="round"/>

  <!-- constellation of 5 genies -->
  <g font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif" text-anchor="middle">
    <g>
      <circle cx="600" cy="200" r="30" fill="#f97316" opacity="0.25" filter="url(#glow)"/>
      <circle cx="600" cy="200" r="18" fill="#f97316"/>
      <text x="600" y="258" fill="#f4f2ea" font-size="19" font-weight="600">One</text>
    </g>
    <g>
      <circle cx="720" cy="168" r="30" fill="#5eead4" opacity="0.25" filter="url(#glow)"/>
      <circle cx="720" cy="168" r="18" fill="#5eead4"/>
      <text x="720" y="226" fill="#f4f2ea" font-size="19" font-weight="600">Spaces</text>
    </g>
    <g>
      <circle cx="843" cy="168" r="30" fill="#818cf8" opacity="0.25" filter="url(#glow)"/>
      <circle cx="843" cy="168" r="18" fill="#818cf8"/>
      <text x="843" y="226" fill="#f4f2ea" font-size="19" font-weight="600">Code</text>
    </g>
    <g>
      <circle cx="963" cy="190" r="30" fill="#c084fc" opacity="0.25" filter="url(#glow)"/>
      <circle cx="963" cy="190" r="18" fill="#c084fc"/>
      <text x="963" y="248" fill="#f4f2ea" font-size="19" font-weight="600">Agents</text>
    </g>
    <g>
      <circle cx="1082" cy="222" r="30" fill="#34d399" opacity="0.25" filter="url(#glow)"/>
      <circle cx="1082" cy="222" r="18" fill="#34d399"/>
      <text x="1082" y="280" fill="#f4f2ea" font-size="19" font-weight="600">Ontology</text>
    </g>
  </g>

  <!-- magic lamp -->
  <g>
    <path d="M168 448 C 120 442 120 502 172 496" fill="none" stroke="url(#lamp)" stroke-width="15" stroke-linecap="round"/>
    <ellipse cx="250" cy="470" rx="92" ry="46" fill="url(#lamp)"/>
    <ellipse cx="250" cy="508" rx="52" ry="12" fill="#b91c1c"/>
    <ellipse cx="250" cy="430" rx="30" ry="13" fill="url(#lamp)"/>
    <circle cx="250" cy="414" r="8" fill="#fb923c"/>
    <path d="M332 460 C 358 450 378 450 398 456 L 378 470 C 360 478 346 480 330 480 Z" fill="url(#lamp)"/>
    <ellipse cx="226" cy="452" rx="30" ry="11" fill="#ffffff" opacity="0.28"/>
  </g>

  <!-- text block -->
  <g font-family="'Segoe UI', system-ui, -apple-system, Helvetica, Arial, sans-serif">
    <rect x="60" y="80" width="252" height="30" rx="15" fill="none" stroke="#f97316" stroke-opacity="0.6"/>
    <text x="76" y="100" fill="#fb923c" font-size="13" font-weight="700" letter-spacing="2.5">DATABRICKS · GENIE FAMILY</text>
    <text x="58" y="212" fill="#f4f2ea" font-size="52" font-weight="700">The Databricks</text>
    <text x="58" y="292" fill="url(#lamp)" font-size="82" font-weight="800">Genies</text>
    <text x="60" y="346" fill="#aaa7b6" font-size="24" font-weight="500">One brand. Five AI assistants &#8212;</text>
    <text x="60" y="378" fill="#aaa7b6" font-size="24" font-weight="500">one for every job.</text>
  </g>
</svg>
